function snd(t){
initAudio();if(!AC)return;var o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
var n=AC.currentTime;
if(t==="bite"){o.type="sawtooth";o.frequency.setValueAtTime(150,n);o.frequency.exponentialRampToValueAtTime(40,n+0.15);g.gain.setValueAtTime(0.4,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.15);o.start(n);o.stop(n+0.15)}
else if(t==="eat"){o.type="sine";o.frequency.setValueAtTime(800,n);o.frequency.exponentialRampToValueAtTime(1200,n+0.08);g.gain.setValueAtTime(0.3,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.1);o.start(n);o.stop(n+0.1)}
else if(t==="hit"){o.type="square";o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(80,n+0.1);g.gain.setValueAtTime(0.35,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.1);o.start(n);o.stop(n+0.1)}
else if(t==="die"){o.type="sawtooth";o.frequency.setValueAtTime(300,n);o.frequency.exponentialRampToValueAtTime(50,n+0.5);g.gain.setValueAtTime(0.4,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.5);o.start(n);o.stop(n+0.5)}
else if(t==="lvup"){o.type="sine";o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+0.1);o.frequency.setValueAtTime(784,n+0.2);o.frequency.setValueAtTime(1047,n+0.3);g.gain.setValueAtTime(0.35,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.5);o.start(n);o.stop(n+0.5)}
else if(t==="combo"){o.type="sine";o.frequency.setValueAtTime(400,n);o.frequency.linearRampToValueAtTime(600,n+0.1);g.gain.setValueAtTime(0.3,n);g.gain.linearRampToValueAtTime(0,n+0.15);o.start(n);o.stop(n+0.15)}
else if(t==="click"){o.type="sine";o.frequency.setValueAtTime(600,n);g.gain.setValueAtTime(0.15,n);g.gain.exponentialRampToValueAtTime(0.01,n+0.05);o.start(n);o.stop(n+0.05)}
}

var o2=AC.createOscillator();o2.type="sine";o2.frequency.setValueAtTime(110,AC.currentTime);var g2=AC.createGain();g2.gain.setValueAtTime(0.04,AC.currentTime);o2.connect(g2);g2.connect(AC.destination);o2.start();bgmOscs.push(o2)}
