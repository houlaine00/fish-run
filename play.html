// ===== AUDIO SYSTEM =====
var audioCtx = null;
var bgmGain = null;
var bgmPlaying = false;
function initAudio(){
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.15;
    bgmGain.connect(audioCtx.destination);
  }catch(e){}
}
function ensureAudio(){
  if(!audioCtx) initAudio();
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type, vol, slide){
  if(!audioCtx) return;
  ensureAudio();
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  if(slide) o.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + dur);
}
function playNoise(dur, vol){
  if(!audioCtx) return;
  ensureAudio();
  var buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for(var i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  var g = audioCtx.createGain();
  g.gain.setValueAtTime(vol || 0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
  src.connect(g);
  g.connect(audioCtx.destination);
  src.start();
}
function sndBite(){ playTone(300, 0.1, 'sawtooth', 0.3, 100); playNoise(0.08, 0.2); }
function sndEat(){ playTone(500, 0.15, 'sine', 0.4, 800); }
function sndCombo(n){ playTone(400 + n * 80, 0.12, 'sine', 0.35, 600 + n * 100); }
function sndLevelUp(){ playTone(400, 0.15, 'sine', 0.4, 600); setTimeout(function(){ playTone(600, 0.15, 'sine', 0.4, 900); }, 150); setTimeout(function(){ playTone(800, 0.2, 'sine', 0.4, 1200); }, 300); }
function sndDeath(){ playTone(400, 0.3, 'sawtooth', 0.4, 80); playNoise(0.3, 0.3); }
function sndItem(){ playTone(600, 0.1, 'sine', 0.35, 1000); setTimeout(function(){ playTone(900, 0.1, 'sine', 0.35, 1200); }, 100); }
function sndSkill(){ playTone(300, 0.2, 'triangle', 0.3, 600); }
function sndBoss(){ playTone(100, 0.5, 'sawtooth', 0.3, 50); playNoise(0.3, 0.15); }
var bgmOscs = [];
function startBGM(){
  if(!audioCtx || bgmPlaying) return;
  ensureAudio();
  bgmPlaying = true;
  var notes = [261,329,392,329,261,293,349,440,349,293,261,392,523,392,261,329];
  var noteIdx = 0;
  function nextNote(){
    if(!bgmPlaying) return;
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = notes[noteIdx % notes.length];
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.45);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.5);
    bgmOscs.push(o);
    noteIdx++;
    if(bgmOscs.length > 10) bgmOscs.splice(0, 5);
    if(bgmPlaying) setTimeout(nextNote, 500);
  }
  nextNote();
}
function stopBGM(){
  bgmPlaying = false;
  for(var i = 0; i < bgmOscs.length; i++){ try{ bgmOscs[i].stop(); }catch(e){} }
  bgmOscs = [];
}

// ===== VIRTUAL JOYSTICK =====
var JOY = {
  active: false,
  touchId: -1,
  ox: 0, oy: 0,
  kx: 0, ky: 0,
  maxR: 55,
  knobR: 22,
  angle: 0,
  dist: 0,
  normX: 0,
  normY: 0
};

function joyStart(x, y, id){
  JOY.active = true;
  JOY.touchId = id;
  JOY.ox = x;
  JOY.oy = y;
  JOY.kx = x;
  JOY.ky = y;
  JOY.normX = 0;
  JOY.normY = 0;
  JOY.angle = 0;
  JOY.dist = 0;
}

function joyMove(x, y){
  if(!JOY.active) return;
  var dx = x - JOY.ox;
  var dy = y - JOY.oy;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if(dist > JOY.maxR){
    dx = dx / dist * JOY.maxR;
    dy = dy / dist * JOY.maxR;
    dist = JOY.maxR;
  }
  JOY.kx = JOY.ox + dx;
  JOY.ky = JOY.oy + dy;
  JOY.dist = dist;
  JOY.angle = Math.atan2(dy, dx);
  JOY.normX = dist > 5 ? dx / JOY.maxR : 0;
  JOY.normY = dist > 5 ? dy / JOY.maxR : 0;
}

function joyEnd(id){
  if(id === undefined || JOY.touchId === id){
    JOY.active = false;
    JOY.touchId = -1;
    JOY.kx = JOY.ox;
    JOY.ky = JOY.oy;
    JOY.normX = 0;
    JOY.normY = 0;
    JOY.dist = 0;
  }
}

function drawJoystick(){
  if(!JOY.active) return;
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.beginPath();
  ctx.arc(JOY.ox, JOY.oy, JOY.maxR, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.arc(JOY.kx, JOY.ky, JOY.knobR, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.restore();
}

// ===== DRAW BACKGROUND =====
function drawBackground(){
  var grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#001133');
  grd.addColorStop(0.3, '#003366');
  grd.addColorStop(0.6, '#004477');
  grd.addColorStop(1, '#002244');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
  // caustic light
  ctx.save();
  ctx.globalAlpha = 0.06;
  var t = frameCount * 0.01;
  for(var i = 0; i < 8; i++){
    var cx = W * 0.2 + Math.sin(t + i * 1.3) * W * 0.3;
    var cy = H * 0.15 + Math.cos(t * 0.7 + i) * H * 0.1;
    var rr = 60 + Math.sin(t + i) * 30;
    var cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, rr);
    cg.addColorStop(0, '#88ccff');
    cg.addColorStop(1, 'rgba(136,204,255,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(cx, cy, rr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  // floating particles
  ctx.save();
  for(var i = 0; i < envParticles.length; i++){
    var p = envParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.pulse += 0.03;
    if(p.x < 0) p.x = W;
    if(p.x > W) p.x = 0;
    if(p.y < 0) p.y = H;
    if(p.y > H) p.y = 0;
    var a = p.alpha * (0.5 + 0.5 * Math.sin(p.pulse));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#aaddff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ===== DRAW SEABED =====
function drawSeabed(){
  var sandY = H - 50;
  var grd = ctx.createLinearGradient(0, sandY, 0, H);
  grd.addColorStop(0, '#c4a35a');
  grd.addColorStop(0.3, '#b8963e');
  grd.addColorStop(1, '#8a6d2b');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(0, sandY);
  for(var x = 0; x <= W; x += 20){
    ctx.lineTo(x, sandY + Math.sin(x * 0.02 + frameCount * 0.005) * 5);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();
  // seaweed
  ctx.save();
  for(var i = 0; i < seaweeds.length; i++){
    var sw = seaweeds[i];
    var sway = Math.sin(frameCount * 0.02 + sw.phase) * 12;
    ctx.strokeStyle = sw.color;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    var bx = sw.x;
    var by = H - 48;
    ctx.moveTo(bx, by);
    for(var s = 1; s <= sw.segments; s++){
      var t = s / sw.segments;
      var sx = bx + sway * t * t;
      var sy = by - sw.h * t;
      ctx.quadraticCurveTo(bx + sway * (t - 0.5/sw.segments) * t, sy + sw.h / sw.segments * 0.5, sx, sy);
    }
    ctx.stroke();
  }
  ctx.restore();
  // coral
  ctx.save();
  for(var i = 0; i < corals.length; i++){
    var c = corals[i];
    var cx = c.x;
    var cy = H - 52;
    ctx.fillStyle = c.color;
    if(c.type === 0){
      for(var b = 0; b < 5; b++){
        var angle = -Math.PI/2 + (b - 2) * 0.35;
        var len = c.size * (0.7 + Math.sin(b * 2) * 0.3);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        var ex = cx + Math.cos(angle) * len;
        var ey = cy + Math.sin(angle) * len;
        ctx.quadraticCurveTo(cx + Math.cos(angle) * len * 0.5 - 5, ey + 5, ex, ey);
        ctx.quadraticCurveTo(cx + Math.cos(angle) * len * 0.5 + 5, ey + 5, cx, cy);
        ctx.fill();
      }
    } else if(c.type === 1){
      ctx.beginPath();
      ctx.arc(cx, cy - c.size * 0.3, c.size * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx - c.size * 0.25, cy - c.size * 0.1, c.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + c.size * 0.25, cy - c.size * 0.1, c.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(cx - c.size * 0.15, cy - c.size, c.size * 0.3, c.size);
      ctx.fillRect(cx - c.size * 0.4, cy - c.size * 0.6, c.size * 0.25, c.size * 0.6);
      ctx.fillRect(cx + c.size * 0.15, cy - c.size * 0.7, c.size * 0.25, c.size * 0.7);
    }
  }
  ctx.restore();
}

// ===== DRAW BUBBLES =====
function drawBubbles(){
  ctx.save();
  for(var i = 0; i < bubbles.length; i++){
    var b = bubbles[i];
    b.y -= b.speed;
    b.wobble += b.wobbleSpeed;
    b.x += Math.sin(b.wobble) * 0.5;
    if(b.y < -10){
      b.y = H + 10;
      b.x = Math.random() * W;
    }
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(180,220,255,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.25, b.y - b.r * 0.25, b.r * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
  }
  ctx.restore();
}

// ===== FISH DRAWING FUNCTIONS =====

function drawFish1_shrimp(x, y, size, dir, frame, isPlayer){
  // Shrimp - curved body + antennae
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir, 1);
  var bodyLen = size * 2.5;
  var bodyH = size * 0.5;
  var wiggle = Math.sin(frame * 0.15) * 3;
  // body
  ctx.beginPath();
  ctx.moveTo(-bodyLen/2, 0);
  ctx.quadraticCurveTo(-bodyLen/4, -bodyH + wiggle, bodyLen/4, -bodyH * 0.7 + wiggle);
  ctx.quadraticCurveTo(bodyLen/2, -bodyH * 0.3, bodyLen/2 + size * 0.3, bodyH * 0.2 + wiggle);
  ctx.quadraticCurveTo(bodyLen/2, bodyH * 0.5, bodyLen/4, bodyH * 0.6);
  ctx.quadraticCurveTo(-bodyLen/4, bodyH - wiggle, -bodyLen/2, 0);
  ctx.fillStyle = isPlayer ? '#ff8866' : '#ee9988';
  ctx.fill();
  ctx.strokeStyle = '#cc6655';
  ctx.lineWidth = 1;
  ctx.stroke();
  // tail
  ctx.beginPath();
  ctx.moveTo(-bodyLen/2, 0);
  ctx.lineTo(-bodyLen/2 - size * 0.4, -size * 0.3 + wiggle);
  ctx.lineTo(-bodyLen/2 - size * 0.3, wiggle);
  ctx.lineTo(-bodyLen/2 - size * 0.4, size * 0.3 + wiggle);
  ctx.closePath();
  ctx.fillStyle = '#ffaa88';
  ctx.fill();
  // antennae
  ctx.strokeStyle = '#dd8877';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(bodyLen/2 + size * 0.2, -bodyH * 0.5);
  ctx.quadraticCurveTo(bodyLen/2 + size * 0.6, -size * 0.8, bodyLen/2 + size, -size * 0.5 + wiggle);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bodyLen/2 + size * 0.15, -bodyH * 0.3);
  ctx.quadraticCurveTo(bodyLen/2 + size * 0.5, -size * 0.6, bodyLen/2 + size * 0.9, -size * 0.3 + wiggle);

  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(bodyLen/2 + size * 0.15, -bodyH * 0.2, size * 0.1, 0, Math.PI * 2);
  ctx.fill();
  // segments
  ctx.strokeStyle = 'rgba(200,100,80,0.3)';
  for(var i = 1; i < 5; i++){
    var sx = -bodyLen/2 + bodyLen * i / 5;
    ctx.beginPath();
    ctx.moveTo(sx, -bodyH * 0.6 + wiggle);
    ctx.lineTo(sx, bodyH * 0.4);
    ctx.stroke();

  // player glow
  if(isPlayer){
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(0, 0, size * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffaa44';
    ctx.fill();
  }
  ctx.restore();
}

function drawFish5_puffer(x, y, size, dir, frame, isPlayer, puffed){

  // tail (small)
  ctx.beginPath();
  ctx.moveTo(-s * 0.6, 0);
  ctx.lineTo(-s * 0.9, -s * 0.25 + wobble);
  ctx.lineTo(-s * 0.9, s * 0.25 + wobble);
  ctx.closePath();
  ctx.fillStyle = '#88cc44';
  ctx.fill();
  // body (round)
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.65, 0, Math.PI * 2);
  ctx.fillStyle = isPlayer ? '#99dd55' : '#88cc44';
  ctx.fill();
  // spots
  ctx.fillStyle = 'rgba(50,100,30,0.4)';
  ctx.beginPath(); ctx.arc(-s*0.15, -s*0.15, s*0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.1, s*0.1, s*0.08, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.2, -s*0.1, s*0.07, 0, Math.PI*2); ctx.fill();

  if(puffed){
    ctx.strokeStyle = '#669933';
    ctx.lineWidth = 1.5;
    for(var i = 0; i < 16; i++){
      var a = i * Math.PI * 2 / 16;
      var sr = s * 0.65;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * sr, Math.sin(a) * sr);
      ctx.lineTo(Math.cos(a) * (sr + s * 0.2), Math.sin(a) * (sr + s * 0.2));

      ctx.beginPath();
      ctx.arc(Math.cos(a) * (sr + s * 0.2), Math.sin(a) * (sr + s * 0.2), 2, 0, Math.PI * 2);
      ctx.fillStyle = '#aadd66';
      ctx.fill();
    }
  }
  // belly
  ctx.beginPath();
  ctx.ellipse(0, s * 0.15, s * 0.4, s * 0.25, 0, 0, Math.PI);
  ctx.fillStyle = '#ddffaa';
  ctx.fill();
  // eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(s * 0.3, -s * 0.15, s * 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(s * 0.33, -s * 0.15, s * 0.08, 0, Math.PI * 2);
  ctx.fill();
  // mouth
  ctx.strokeStyle = '#557733';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(s * 0.45, s * 0.05, s * 0.08, 0, Math.PI);
  ctx.stroke();
  if(isPlayer){
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(0, 0, s * 1.2, 0, Math.PI * 2);
    ctx.fillStyle = '#88cc44';
    ctx.fill();
  }
  ctx.restore();
}

  // dorsal fin (small)
  ctx.beginPath();
  ctx.moveTo(-size * 0.15, -size * 0.38);
  ctx.lineTo(-size * 0.05, -size * 0.5);
  ctx.lineTo(size * 0.05, -size * 0.35);
  ctx.fillStyle = '#3355aa';
  ctx.fill();
  // flipper
  ctx.beginPath();
  ctx.moveTo(size * 0.1, size * 0.2);
  ctx.quadraticCurveTo(size * 0.0, size * 0.45, size * 0.25, size * 0.35);
  ctx.quadraticCurveTo(size * 0.2, size * 0.25, size * 0.1, size * 0.2);
  ctx.fillStyle = '#3355aa';
  ctx.fill();
  // eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(size * 0.4, -size * 0.1, size * 0.06, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(size * 0.42, -size * 0.1, size * 0.03, 0, Math.PI * 2);
  ctx.fill();
  // blowhole
  ctx.fillStyle = '#223366';
  ctx.beginPath();
  ctx.ellipse(size * 0.15, -size * 0.32, size * 0.04, size * 0.02, 0, 0, Math.PI * 2);
  ctx.fill();
  // water spout (animated)
  ctx.save();
  ctx.globalAlpha = 0.4 + Math.sin(frame * 0.15) * 0.2;
  ctx.strokeStyle = '#88ccff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(size * 0.15, -size * 0.34);
  ctx.quadraticCurveTo(size * 0.1, -size * 0.6, size * 0.25 - Math.sin(frame * 0.2) * 5, -size * 0.8);
  ctx.stroke();
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(size * 0.15, -size * 0.34);
  ctx.quadraticCurveTo(size * 0.2, -size * 0.55, size * 0.05 + Math.sin(frame * 0.2) * 5, -size * 0.75);
  ctx.stroke();
  // spray droplets
  ctx.fillStyle = '#aaddff';
  for(var d = 0; d < 5; d++){
    var da = frame * 0.1 + d * 1.3;
    ctx.beginPath();
    ctx.arc(size * 0.15 + Math.sin(da) * 8, -size * 0.7 - Math.abs(Math.sin(da * 0.7)) * 12, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  if(isPlayer){
    ctx.globalAlpha = 0.1;
    ctx.beginPath();
    ctx.arc(0, 0, size * 1.1, 0, Math.PI * 2);
    ctx.fillStyle = '#4466bb';
    ctx.fill();
  }
  ctx.restore();
}

function drawFish10_boss(x, y, size, dir, frame, isPlayer){
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir, 1);
  var wobble = Math.sin(frame * 0.08) * 3;
  // tentacles
  ctx.lineWidth = size * 0.08;
  ctx.lineCap = 'round';
  var tentColors = ['#7722cc','#9944ee','#6611aa','#8833dd'];
  for(var t = 0; t < 6; t++){
    ctx.strokeStyle = tentColors[t % tentColors.length];
    ctx.beginPath();
    var tx = -size * 0.4 + t * size * 0.12;
    ctx.moveTo(tx, size * 0.3);
    var tLen = size * 0.5 + Math.sin(frame * 0.05 + t) * size * 0.15;
    for(var s = 0; s < 5; s++){
      var st = s / 4;
      var sx = tx + Math.sin(frame * 0.06 + t + s * 0.8) * (10 + st * 15);
      var sy = size * 0.3 + st * tLen;
      ctx.lineTo(sx, sy);
    }
    ctx.stroke();
    // suction cups
    for(var s = 1; s < 4; s++){
      var st = s / 4;
      var sx = tx + Math.sin(frame * 0.06 + t + s * 0.8) * (10 + st * 15);
      var sy = size * 0.3 + st * tLen;
      ctx.beginPath();
      ctx.arc(sx, sy, size * 0.025, 0, Math.PI * 2);
      ctx.fillStyle = '#aa66dd';
      ctx.fill();
    }
  }
  // body (large oval)
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.6, size * 0.45, 0, 0, Math.PI * 2);
  ctx.fillStyle = isPlayer ? '#9944ee' : '#7722cc';
  ctx.fill();
  // body texture
  ctx.fillStyle = 'rgba(150,100,200,0.3)';
  for(var b = 0; b < 5; b++){
    ctx.beginPath();
    ctx.arc(
      -size * 0.2 + b * size * 0.1,
      -size * 0.1 + Math.sin(b) * size * 0.1,
      size * 0.06, 0, Math.PI * 2
    );
    ctx.fill();
  }
  // big eye
  ctx.fillStyle = '#ffee44';
  ctx.beginPath();
  ctx.ellipse(size * 0.25, -size * 0.08, size * 0.15, size * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();
  // pupil
  ctx.fillStyle = '#110033';
  ctx.beginPath();
  ctx.ellipse(size * 0.27, -size * 0.08, size * 0.07, size * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();
  // eye glint
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(size * 0.3, -size * 0.12, size * 0.03, 0, Math.PI * 2);
  ctx.fill();
  // second eye (smaller, behind)
  ctx.fillStyle = '#ddbb33';
  ctx.beginPath();
  ctx.arc(size * 0.1, -size * 0.15, size * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#110033';
  ctx.beginPath();
  ctx.arc(size * 0.12, -size * 0.15, size * 0.04, 0, Math.PI * 2);
  ctx.fill();
  // mouth
  ctx.strokeStyle = '#ff4466';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(size * 0.35, size * 0.1, size * 0.12, 0.2, Math.PI - 0.2);
  ctx.stroke();
  // teeth
  ctx.fillStyle = '#fff';
  for(var th = 0; th < 4; th++){
    var ta = 0.5 + th * 0.4;
    var trx = size * 0.35 + Math.cos(ta) * size * 0.12;
    var try_ = size * 0.1 + Math.sin(ta) * size * 0.12;
    ctx.beginPath();
    ctx.moveTo(trx - 2, try_);
    ctx.lineTo(trx, try_ + 4);
    ctx.lineTo(trx + 2, try_);
    ctx.fill();
  }
  // crown horns
  ctx.fillStyle = '#8833cc';
  for(var h = 0; h < 3; h++){
    ctx.beginPath();
    var hx = -size * 0.1 + h * size * 0.12;
    ctx.moveTo(hx - 3, -size * 0.45);
    ctx.lineTo(hx, -size * 0.6);
    ctx.lineTo(hx + 3, -size * 0.45);
    ctx.fill();
  }
  // aura
  ctx.globalAlpha = 0.08 + Math.sin(frame * 0.05) * 0.04;
  ctx.beginPath();
  ctx.arc(0, 0, size * 1.2, 0, Math.PI * 2);
  ctx.fillStyle = '#aa44ff';
  ctx.fill();
  if(isPlayer){
    ctx.globalAlpha = 0.1;
    ctx.beginPath();
    ctx.arc(0, 0, size * 1.1, 0, Math.PI * 2);
    ctx.fillStyle = '#9944ee';
    ctx.fill();
  }
  ctx.restore();
}

var drawFishFuncs = [
  drawFish1_shrimp, drawFish2_tropical, drawFish3_clown, drawFish4_bluetang,
  drawFish5_puffer, drawFish6_turtle, drawFish7_sword, drawFish8_shark,
  drawFish9_whale, drawFish10_boss
];

function drawFishAt(type, x, y, size, dir, frame, isPlayer, extra){
  var fn = drawFishFuncs[type];
  if(fn){
    if(type === 4) fn(x, y, size, dir, frame, isPlayer, extra);
    else fn(x, y, size, dir, frame, isPlayer);
  }
}

// ===== ENEMY SPAWNING =====
function spawnEnemy(forceType){
  var ld = levelData[currentLevel];
  var maxTier = Math.min(player.tier + 3, 9);
  var minTier = Math.max(0, player.tier - 2);
  var type;
  if(forceType !== undefined){
    type = forceType;
  } else if(ld.boss && enemies.length < 3 && Math.random() < 0.02){
    type = 9;
  } else {
    var bigChance = ld.bigFishChance;
    if(Math.random() < bigChance){
      type = Math.floor(Math.random() * (maxTier - minTier + 1)) + minTier;
      if(type > maxTier) type = maxTier;
    } else {
      type = Math.floor(Math.random() * Math.max(1, player.tier + 1));
    }
  }
  var cfg = FISH_CFG[type];
  var sizeVar = 0.8 + Math.random() * 0.4;
  var edge = Math.floor(Math.random() * 4);
  var ex, ey;
  if(edge === 0){ ex = -cfg.size * sizeVar; ey = Math.random() * H; }
  else if(edge === 1){ ex = W + cfg.size * sizeVar; ey = Math.random() * H; }
  else if(edge === 2){ ex = Math.random() * W; ey = -cfg.size * sizeVar; }
  else { ex = Math.random() * W; ey = H + cfg.size * sizeVar; }
  var e = {
    type: type,
    x: ex,
    y: ey,
    vx: 0,
    vy: 0,
    size: cfg.size * sizeVar,
    speed: cfg.speed * (0.8 + Math.random() * 0.4),
    dir: ex < W / 2 ? 1 : -1,
    tier: cfg.tier,
    xp: cfg.xp,
    hp: type === 9 ? 5 : 1,
    puffed: false,
    puffedTimer: 0,
    animFrame: Math.random() * 1000 | 0,
    aiState: 'wander',
    aiTimer: 0,
    alive: true,
    isBoss: type === 9
  };
  enemies.push(e);
}

function spawnItem(){
  var type = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
  items.push({
    x: 60 + Math.random() * (W - 120),
    y: 60 + Math.random() * (H - 120),
    type: type,
    timer: 600,
    anim: 0,
    size: 15
  });
}

// ===== PARTICLES =====
function addParticle(x, y, color, count, speed, life){
  for(var i = 0; i < count; i++){
    var a = Math.random() * Math.PI * 2;
    var s = Math.random() * speed;
    particles.push({
      x: x, y: y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: life || 30,
      maxLife: life || 30,
      color: color,
      size: 2 + Math.random() * 4
    });
  }
}

function addFloatingText(x, y, text, color){
  floatingTexts.push({
    x: x, y: y,
    text: text,
    color: color || '#ffff00',
    life: 50,
    maxLife: 50,
    vy: -1.5
  });
}

// ===== GAME INIT =====
function startLevel(lvl){
  currentLevel = lvl;
  var ld = levelData[lvl];
  enemies = [];
  items = [];
  particles = [];
  floatingTexts = [];
  score = 0;
  combo = 0;
  comboTimer = 0;
  comboMax = 0;
  levelTimer = ld.time * 60;
  gameTime = 0;
  spawnTimer = 0;
  itemSpawnTimer = 0;
  levelTargetProgress = 0;
  bossDefeated = 0;
  createPlayer();
  initEnvironment();
  layoutSkillBtns();
  for(var i = 0; i < 5; i++) spawnEnemy();
  gameState = 'playing';
  startBGM();
}

function startEndless(){
  currentLevel = -1;
  enemies = [];
  items = [];
  particles = [];
  floatingTexts = [];
  score = 0;
  combo = 0;
  comboTimer = 0;
  comboMax = 0;
  levelTimer = 9999;
  gameTime = 0;
  spawnTimer = 0;
  itemSpawnTimer = 0;
  levelTargetProgress = 0;
  bossDefeated = 0;
  createPlayer();
  initEnvironment();
  layoutSkillBtns();
  for(var i = 0; i < 8; i++) spawnEnemy();
  gameState = 'playing';
  startBGM();
}

// ===== UPDATE =====
function update(){
  if(gameState !== 'playing') return;
  frameCount++;
  gameTime += dt;
  if(levelTimer > 0) levelTimer--;

  // Combo timer
  if(comboTimer > 0){
    comboTimer--;
    if(comboTimer <= 0) combo = 0;
  }

  // Screen shake decay
  if(screenShake > 0) screenShake *= 0.9;
  if(screenShake < 0.5) screenShake = 0;

  // Player update
  updatePlayer();
  // Enemy update
  updateEnemies();
  // Item update
  updateItems();
  // Particles
  updateParticles();
  // Check level completion
  checkLevelComplete();
}

function updatePlayer(){
  if(!player.alive) return;
  var p = player;
  p.animTimer++;
  p.animFrame++;

  // Apply joystick input
  if(JOY.active){
    var spd = p.speed;
    if(p.speedBoost > 0) spd *= 1.8;
    if(p.dash > 0) spd *= 3;
    p.vx += JOY.normX * spd * 0.15;
    p.vy += JOY.normY * spd * 0.15;
    if(JOY.normX !== 0) p.dir = JOY.normX > 0 ? 1 : -1;
  }

  // Friction
  p.vx *= 0.92;
  p.vy *= 0.92;

  // Speed limit
  var maxSpd = p.speed * 1.5;
  if(p.speedBoost > 0) maxSpd *= 1.8;
  if(p.dash > 0) maxSpd *= 3;
  var curSpd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
  if(curSpd > maxSpd){
    p.vx = p.vx / curSpd * maxSpd;
    p.vy = p.vy / curSpd * maxSpd;
  }

  p.x += p.vx;
  p.y += p.vy;

  // Bounds
  p.x = Math.max(p.size, Math.min(W - p.size, p.x));
  p.y = Math.max(p.size, Math.min(H - p.size - 50, p.y));

  // Trail
  if(Math.abs(p.vx) > 0.5 || Math.abs(p.vy) > 0.5){
    p.trail.push({x: p.x, y: p.y, life: 15, size: p.size * 0.3});
  }
  for(var i = p.trail.length - 1; i >= 0; i--){
    p.trail[i].life--;
    if(p.trail[i].life <= 0) p.trail.splice(i, 1);
  }

  // Mouth animation decay
  if(p.mouthTimer > 0) p.mouthTimer--;
  else p.mouthOpen = 0;

  // Buff timers
  if(p.shield > 0) p.shield--;
  if(p.magnet > 0) p.magnet--;
  if(p.speedBoost > 0) p.speedBoost--;
  if(p.xpMult > 1) p.xpMult = Math.max(1, p.xpMult - 0.005);
  if(p.dash > 0) p.dash--;
  if(p.invincible > 0) p.invincible--;
  if(p.timeStop > 0) p.timeStop--;

  // Skill cooldowns
  if(p.dashCD > 0) p.dashCD--;
  if(p.shieldCD > 0) p.shieldCD--;
  if(p.magnetCD > 0) p.magnetCD--;
  if(p.timeStopCD > 0) p.timeStopCD--;

  // Magnet effect
  if(p.magnet > 0){
    for(var i = 0; i < enemies.length; i++){
      var e = enemies[i];
      if(!e.alive) continue;
      if(e.tier <= p.tier){
        var dx = p.x - e.x;
        var dy = p.y - e.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if(dist < 200 && dist > 1){
          e.vx += dx / dist * 2;
          e.vy += dy / dist * 2;
        }
      }
    }
  }

  // Collision with enemies
  for(var i = enemies.length - 1; i >= 0; i--){
    var e = enemies[i];
    if(!e.alive) continue;
    var dx = p.x - e.x;
    var dy = p.y - e.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var touchDist = (p.size + e.size) * 0.6;
    if(dist < touchDist){
      if(e.tier <= p.tier){
        // Eat!
        eatEnemy(e, i);
      } else {
        // Die!
        if(p.invincible <= 0 && p.shield <= 0){
          playerDie();
        } else if(p.shield > 0){
          p.shield = 0;
          p.invincible = 60;
          addParticle(p.x, p.y, '#4488ff', 15, 3, 20);
          screenShake = 8;
          sndItem();
        }
      }
    }
  }

  // Collision with items
  for(var i = items.length - 1; i >= 0; i--){
    var it = items[i];
    var dx = p.x - it.x;
    var dy = p.y - it.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if(dist < p.size + it.size){
      applyItem(it);
      items.splice(i, 1);
    }
  }
}

function eatEnemy(e, idx){
  var p = player;
  sndBite();
  setTimeout(function(){ sndEat(); }, 80);
  p.mouthOpen = 1;
  p.mouthTimer = 15;
  p.eatCount++;
  p.totalEatCount++;

  // Combo
  combo++;
  comboTimer = 90;
  if(combo > comboMax) comboMax = combo;
  if(combo >= 3) sndCombo(combo);

  // XP
  var xpGain = e.xp * p.xpMult;
  if(combo >= 5) xpGain *= 2;
  p.xp += xpGain;
  score += e.xp * combo;
  levelTargetProgress++;

  // Floating text
  var txt = '+' + e.xp;
  if(combo >= 3) txt += ' x' + combo;
  addFloatingText(e.x, e.y - 20, txt, combo >= 5 ? '#ff4444' : combo >= 3 ? '#ffaa00' : '#ffff00');
  if(combo === 5) addFloatingText(p.x, p.y - 40, 'COMBO x5!', '#ff4400');
  if(combo === 10) addFloatingText(p.x, p.y - 40, 'MEGA COMBO!', '#ff0044');

  // Particles
  addParticle(e.x, e.y, FISH_CFG[e.type].color, 8, 3, 20);

  // Screen shake
  screenShake = Math.min(combo * 1.5, 10);

  // Boss kill
  if(e.isBoss){
    bossDefeated++;
    sndBoss();
    addParticle(e.x, e.y, '#aa44ff', 30, 5, 40);
    screenShake = 15;
  }

  // Check evolution
  if(p.tier < 9 && p.xp >= EVO_XP[p.tier + 1]){
    evolve();
  }

  // Puffer reaction
  if(e.type === 4 && !e.puffed){
    e.puffed = true;
    e.puffedTimer = 60;
    e.size *= 1.5;
    e.speed *= 0.5;
  }

  enemies.splice(idx, 1);
}

function evolve(){
  var p = player;
  p.tier++;
  p.xp = 0;
  var cfg = FISH_CFG[p.tier];
  p.size = cfg.size;
  p.speed = cfg.speed + 0.5;
  sndLevelUp();
  addFloatingText(p.x, p.y - 50, 'EVOLVE! Lv.' + (p.tier + 1), '#ff88ff');
  addParticle(p.x, p.y, '#ffdd44', 25, 4, 35);
  screenShake = 12;
}

function playerDie(){
  player.alive = false;
  sndDeath();
  addParticle(player.x, player.y, '#ff4444', 30, 5, 40);
  addParticle(player.x, player.y, '#ffaa44', 20, 4, 30);
  screenShake = 15;
  stopBGM();
  setTimeout(function(){
    gameState = 'gameOver';
  }, 1000);
}

function applyItem(it){
  sndItem();
  var p = player;
  addFloatingText(it.x, it.y - 20, ITEM_NAMES[it.type], ITEM_COLORS[it.type]);
  addParticle(it.x, it.y, ITEM_COLORS[it.type], 10, 3, 20);
  if(it.type === 'speed'){ p.speedBoost = 300; }
  else if(it.type === 'shield'){ p.shield = 300; }
  else if(it.type === 'magnet'){ p.magnet = 300; }
  else if(it.type === 'xpup'){ p.xpMult = 3; }
  else if(it.type === 'heal'){ p.invincible = 120; }
  else if(it.type === 'score'){ score += 200; }
}

function useSkill(idx){
  if(!player || !player.alive) return;
  var p = player;
  sndSkill();
  if(idx === 0){ // Dash
    if(p.dashCD > 0) return;
    p.dash = 20;
    p.dashCD = SKILL_DEF[0].cd / (1000/60);
    addParticle(p.x, p.y, '#ff4444', 10, 4, 15);
    screenShake = 5;
  } else if(idx === 1){ // Shield
    if(p.shieldCD > 0) return;
    p.shield = 360;
    p.shieldCD = SKILL_DEF[1].cd / (1000/60);
    addParticle(p.x, p.y, '#4488ff', 15, 3, 25);
  } else if(idx === 2){ // Magnet
    if(p.magnetCD > 0) return;
    p.magnet = 360;
    p.magnetCD = SKILL_DEF[2].cd / (1000/60);
    addParticle(p.x, p.y, '#ff8800', 12, 3, 20);
  } else if(idx === 3){ // Time Stop
    if(p.timeStopCD > 0) return;
    p.timeStop = 240;
    p.timeStopCD = SKILL_DEF[3].cd / (1000/60);
    addParticle(p.x, p.y, '#aa44ff', 20, 5, 30);
    screenShake = 8;
  }
}

function updateEnemies(){
  var p = player;
  var ld = levelData[currentLevel >= 0 ? currentLevel : 0];
  var maxFish = ld ? ld.fishMax : 25;
  // Spawn
  spawnTimer++;
  var spawnRate = 60 - Math.min(gameTime * 0.05, 30);
  if(spawnTimer >= spawnRate && enemies.length < maxFish){
    spawnTimer = 0;
    spawnEnemy();
  }
  // Item spawn
  itemSpawnTimer++;
  if(itemSpawnTimer >= 300 && items.length < 3){
    itemSpawnTimer = 0;
    spawnItem();
  }
  // Update each enemy
  for(var i = enemies.length - 1; i >= 0; i--){
    var e = enemies[i];
    if(!e.alive){ enemies.splice(i, 1); continue; }
    e.animFrame++;
    // Puffer unpuff
    if(e.puffedTimer > 0){
      e.puffedTimer--;
      if(e.puffedTimer <= 0){
        e.puffed = false;
        e.size = FISH_CFG[e.type].size * (0.8 + Math.random() * 0.4);
        e.speed = FISH_CFG[e.type].speed * (0.8 + Math.random() * 0.4);
      }
    }
    // Time stop
    if(player.timeStop > 0 && !e.isBoss) continue;

    // AI
    if(p && p.alive){
      var dx = p.x - e.x;
      var dy = p.y - e.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if(e.tier > p.tier && dist < 300){
        // Chase
        e.aiState = 'chase';
        e.vx += (dx / dist) * e.speed * 0.08;
        e.vy += (dy / dist) * e.speed * 0.08;
        if(dx !== 0) e.dir = dx > 0 ? 1 : -1;
      } else if(e.tier <= p.tier && dist < 150){
        // Flee
        e.aiState = 'flee';
        e.vx -= (dx / dist) * e.speed * 0.06;
        e.vy -= (dy / dist) * e.speed * 0.06;
        if(dx !== 0) e.dir = dx > 0 ? -1 : 1;
      } else {
        e.aiState = 'wander';
        e.aiTimer++;
        if(e.aiTimer > 120 + Math.random() * 120){
          e.aiTimer = 0;
          var ra = Math.random() * Math.PI * 2;
          e.vx += Math.cos(ra) * e.speed * 0.5;
          e.vy += Math.sin(ra) * e.speed * 0.5;
        }
      }
      // Boss special: dash attack
      if(e.isBoss && dist < 200 && dist > 80){
        if(Math.random() < 0.02){
          e.vx += (dx / dist) * 8;
          e.vy += (dy / dist) * 8;
        }
      }
    } else {
      // Wander if player dead
      e.aiTimer++;
      if(e.aiTimer > 120){
        e.aiTimer = 0;
        var ra = Math.random() * Math.PI * 2;
        e.vx += Math.cos(ra) * e.speed * 0.3;
        e.vy += Math.sin(ra) * e.speed * 0.3;
      }
    }
    // Friction
    e.vx *= 0.95;
    e.vy *= 0.95;
    // Speed limit
    var eSpd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
    if(eSpd > e.speed * 1.5){
      e.vx = e.vx / eSpd * e.speed * 1.5;
      e.vy = e.vy / eSpd * e.speed * 1.5;
    }
    e.x += e.vx;
    e.y += e.vy;
    // Direction
    if(Math.abs(e.vx) > 0.3) e.dir = e.vx > 0 ? 1 : -1;
    // Remove if far out of bounds
    if(e.x < -200 || e.x > W + 200 || e.y < -200 || e.y > H + 200){
      enemies.splice(i, 1);
    }
  }
}

function updateItems(){
  for(var i = items.length - 1; i >= 0; i--){
    var it = items[i];
    it.timer--;
    it.anim += 0.05;
    if(it.timer <= 0){
      items.splice(i, 1);
    }
  }
}

function updateParticles(){
  for(var i = particles.length - 1; i >= 0; i--){
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life--;
    if(p.life <= 0) particles.splice(i, 1);
  }
  for(var i = floatingTexts.length - 1; i >= 0; i--){
    var ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life--;
    if(ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function checkLevelComplete(){
  if(currentLevel < 0) return;
  var ld = levelData[currentLevel];
  var complete = false;
  if(ld.target === 'eat' && levelTargetProgress >= ld.need) complete = true;
  if(ld.target === 'survive' && levelTimer <= 0) complete = true;
  if(ld.target === 'boss' && bossDefeated >= ld.need) complete = true;
  if(ld.target === 'tier' && player.tier >= ld.need) complete = true;

  if(levelTimer <= 0 && !complete){
    // Time up but target not met - game over
    if(ld.target !== 'survive'){
      playerDie();
      return;
    }
  }

  if(complete){
    gameState = 'levelComplete';
    stopBGM();
    sndLevelUp();
    if(currentLevel + 1 < 7) levelUnlocked[currentLevel + 1] = true;
  }
}

function render(){
  ctx.save();
  // Screen shake
  if(screenShake > 0){
    ctx.translate(
      (Math.random() - 0.5) * screenShake * 2,
      (Math.random() - 0.5) * screenShake * 2
    );
  }
  drawBackground();
  drawSeabed();
  drawBubbles();

  if(gameState === 'menu'){
    renderMenu();
  } else if(gameState === 'levelSelect'){
    renderLevelSelect();
  } else if(gameState === 'playing' || gameState === 'paused' || gameState === 'gameOver' || gameState === 'levelComplete' || gameState === 'victory'){
    renderGame();
  }
  ctx.restore();
}

function renderGame(){
  // Player trail
  if(player){
    ctx.save();
    for(var i = 0; i < player.trail.length; i++){
      var tr = player.trail[i];
      ctx.globalAlpha = tr.life / 15 * 0.3;
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, tr.size, 0, Math.PI * 2);
      ctx.fillStyle = '#44aaff';
      ctx.fill();
    }
    ctx.restore();
  }

  // Draw enemies (sorted by size for depth)
  var sorted = enemies.slice().sort(function(a, b){ return a.size - b.size; });
  for(var i = 0; i < sorted.length; i++){
    var e = sorted[i];
    if(!e.alive) continue;
    var fadeEdge = true;
    if(e.x < -50 || e.x > W + 50 || e.y < -50 || e.y > H + 50) continue;
    // Time stop effect
    if(player.timeStop > 0 && !e.isBoss){
      ctx.save();
      ctx.globalAlpha = 0.5;
    }
    drawFishAt(e.type, e.x, e.y, e.size, e.dir, e.animFrame, false, e.puffed);
    if(player.timeStop > 0 && !e.isBoss){
      ctx.restore();
    }
    // Boss HP bar
    if(e.isBoss){
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(e.x - 30, e.y - e.size - 15, 60, 8);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(e.x - 30, e.y - e.size - 15, 60 * (e.hp / 5), 8);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(e.x - 30, e.y - e.size - 15, 60, 8);
      ctx.restore();
    }
  }

  // Draw items
  for(var i = 0; i < items.length; i++){
    var it = items[i];
    var pulse = 1 + Math.sin(it.anim * 3) * 0.15;
    ctx.save();
    ctx.translate(it.x, it.y);
    ctx.scale(pulse, pulse);
    // Glow
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(0, 0, it.size + 5, 0, Math.PI * 2);
    ctx.fillStyle = ITEM_COLORS[it.type];
    ctx.fill();
    ctx.globalAlpha = 1;
    // Icon
    ctx.beginPath();
    ctx.arc(0, 0, it.size, 0, Math.PI * 2);
    ctx.fillStyle = ITEM_COLORS[it.type];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Symbol
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    var sym = '+';
    if(it.type === 'speed') sym = '\u26a1';
    else if(it.type === 'shield') sym = '\u26e8';
    else if(it.type === 'magnet') sym = '\u25c9';
    else if(it.type === 'xpup') sym = '\u2605';
    else if(it.type === 'heal') sym = '\u2764';
    else if(it.type === 'score') sym = '$';
    ctx.fillText(sym, 0, 0);
    ctx.restore();
  }

  // Draw player
  if(player && player.alive){
    // Shield visual
    if(player.shield > 0){
      ctx.save();
      ctx.globalAlpha = 0.2 + Math.sin(frameCount * 0.1) * 0.1;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.size + 15, 0, Math.PI * 2);
      ctx.fillStyle = '#4488ff';
      ctx.fill();
      ctx.strokeStyle = '#88bbff';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }
    // Invincibility flash
    if(player.invincible > 0 && Math.floor(frameCount / 3) % 2 === 0){
      ctx.save();
      ctx.globalAlpha = 0.6;
      drawFishAt(player.tier, player.x, player.y, player.size, player.dir, player.animFrame, true);
      ctx.restore();
    } else {
      drawFishAt(player.tier, player.x, player.y, player.size, player.dir, player.animFrame, true);
    }
    // Dash effect
    if(player.dash > 0){
      ctx.save();
      ctx.globalAlpha = 0.3;
      for(var d = 1; d <= 3; d++){
        ctx.globalAlpha = 0.3 / d;
        var ox = -player.vx * d * 3;
        var oy = -player.vy * d * 3;
        drawFishAt(player.tier, player.x + ox, player.y + oy, player.size * (1 - d * 0.1), player.dir, player.animFrame, false);
      }
      ctx.restore();
    }
  }

  // Particles
  ctx.save();
  for(var i = 0; i < particles.length; i++){
    var p = particles[i];
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.restore();

  // Floating texts
  ctx.save();
  for(var i = 0; i < floatingTexts.length; i++){
    var ft = floatingTexts[i];
    ctx.globalAlpha = ft.life / ft.maxLife;
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = ft.color;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.strokeText(ft.text, ft.x, ft.y);
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.restore();

  // HUD
  drawHUD();
  // Skill buttons
  drawSkillBtns();
  // Joystick
  drawJoystick();

  // Pause overlay
  if(gameState === 'paused'){
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText('\u6682\u505c', W / 2, H / 2 - 20);
    ctx.font = '16px Arial';
    ctx.fillText('\u70b9\u51fb\u7ee7\u7eed', W / 2, H / 2 + 20);
  }

  // Game over overlay
  if(gameState === 'gameOver'){
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.fillText('\u6e38\u620f\u7ed3\u675f', W / 2, H / 2 - 60);
    ctx.font = '20px Arial';
    ctx.fillStyle = '#fff';
    ctx.fillText('\u5206\u6570: ' + score, W / 2, H / 2 - 15);
    ctx.fillText('\u5403\u6389: ' + player.totalEatCount + ' \u6761\u9c7c', W / 2, H / 2 + 15);
    ctx.fillText('\u8fde\u51fb: ' + comboMax, W / 2, H / 2 + 45);
    // Retry button
    ctx.fillStyle = 'rgba(0,80,150,0.7)';
    ctx.strokeStyle = '#44aaff';
    ctx.lineWidth = 2;
    roundRect(W/2 - 70, H/2 + 70, 140, 40, 10);
    ctx.fill();
    ctx.stroke();
    ctx.font = 'bold 16px Arial';
    ctx.fillStyle = '#fff';
    ctx.fillText('\u91cd\u8bd5', W / 2, H / 2 + 90);
  }

  // Level complete overlay
  if(gameState === 'levelComplete'){
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('\u5173\u5361\u901a\u8fc7!', W / 2, H / 2 - 50);
    ctx.font = '18px Arial';
    ctx.fillStyle = '#fff';
    ctx.fillText('\u5206\u6570: ' + score, W / 2, H / 2 - 10);
    ctx.fillText('\u5403\u6389: ' + player.totalEatCount + ' \u6761\u9c7c', W / 2, H / 2 + 20);
    // Next button
    if(currentLevel + 1 < 7){
      ctx.fillStyle = 'rgba(0,80,150,0.7)';
      ctx.strokeStyle = '#44aaff';
      ctx.lineWidth = 2;
      roundRect(W/2 - 70, H/2 + 50, 140, 40, 10);
      ctx.fill();
      ctx.stroke();
      ctx.font = 'bold 16px Arial';
      ctx.fillStyle = '#fff';
      ctx.fillText('\u4e0b\u4e00\u5173', W / 2, H / 2 + 70);
    }
    // Menu button
    ctx.fillStyle = 'rgba(50,50,50,0.7)';
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    roundRect(W/2 - 50, H/2 + 100, 100, 35, 10);
    ctx.fill();
    ctx.stroke();
    ctx.font = '14px Arial';
    ctx.fillStyle = '#ccc';
    ctx.fillText('\u8fd4\u56de', W / 2, H / 2 + 118);
  }

  frameCount++;
}

    else if(ld.target === 'boss') progText = bossDefeated + '/' + ld.need;
    else if(ld.target === 'tier') progText = 'Lv.' + player.tier + '/Lv.' + ld.need;
    ctx.fillText(ld.name + ': ' + progText, W - 60, 35);
  } else {

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('||', W - 35, 57);

function drawSkillBtns(){
  for(var i = 0; i < skillBtns.length; i++){
    var b = skillBtns[i];
    var def = SKILL_DEF[i];
    var cdMax = def.cd / (1000/60);
    var cd = 0;
    var active = 0;
    if(i === 0) { cd = player ? player.dashCD : 0; active = player ? player.dash : 0; }
    else if(i === 1) { cd = player ? player.shieldCD : 0; active = player ? player.shield : 0; }
    else if(i === 2) { cd = player ? player.magnetCD : 0; active = player ? player.magnet : 0; }
    else if(i === 3) { cd = player ? player.timeStopCD : 0; active = player ? player.timeStop : 0; }
    ctx.save();
    // Button bg
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    if(active > 0){
      ctx.fillStyle = def.color;
      ctx.globalAlpha = 0.6 + Math.sin(frameCount * 0.1) * 0.2;
    } else if(cd > 0){
      ctx.fillStyle = 'rgba(50,50,50,0.7)';
    } else {
      ctx.fillStyle = 'rgba(0,50,100,0.7)';
    }
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = active > 0 ? '#fff' : def.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    // CD overlay
    if(cd > 0){
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.arc(b.x, b.y, b.r, -Math.PI/2, -Math.PI/2 + (1 - cd / cdMax) * Math.PI * 2);
      ctx.closePath();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fill();
      // CD text
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(Math.ceil(cd / 60) + 's', b.x, b.y);
    }
    // Icon
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    if(cd <= 0 || active > 0){
      var icons = ['\u26a1','\u26e8','\u25c9','\u23f0'];
      ctx.fillText(icons[i], b.x, b.y);
    }
    ctx.restore();
  }
}

// ===== UTILITY =====
function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== INPUT =====
function getTouchPos(touch){
  var rect = canvas.getBoundingClientRect();
  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top
  };
}

function isInRect(px, py, rx, ry, rw, rh){
  return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
}

canvas = document.getElementById('gc');
ctx = canvas.getContext('2d');

canvas.addEventListener('touchstart', function(ev){
  ev.preventDefault();
  ensureAudio();
  for(var i = 0; i < ev.changedTouches.length; i++){
    var t = ev.changedTouches[i];
    var pos = getTouchPos(t);
    handlePointerDown(pos.x, pos.y, t.identifier);
  }
}, {passive: false});

canvas.addEventListener('touchmove', function(ev){
  ev.preventDefault();
  for(var i = 0; i < ev.changedTouches.length; i++){
    var t = ev.changedTouches[i];
    var pos = getTouchPos(t);
    handlePointerMove(pos.x, pos.y, t.identifier);
  }
}, {passive: false});

canvas.addEventListener('touchend', function(ev){
  ev.preventDefault();
  for(var i = 0; i < ev.changedTouches.length; i++){
    var t = ev.changedTouches[i];
    handlePointerUp(t.identifier);
  }
}, {passive: false});

canvas.addEventListener('touchcancel', function(ev){
  for(var i = 0; i < ev.changedTouches.length; i++){
    handlePointerUp(ev.changedTouches[i].identifier);
  }
});

// Mouse support
var mouseDown = false;
var mouseId = -1;

canvas.addEventListener('mousedown', function(ev){
  ensureAudio();
  var rect = canvas.getBoundingClientRect();
  var x = ev.clientX - rect.left;
  var y = ev.clientY - rect.top;
  mouseDown = true;
  mouseId = Date.now();
  handlePointerDown(x, y, mouseId);
});

canvas.addEventListener('mousemove', function(ev){
  if(!mouseDown) return;
  var rect = canvas.getBoundingClientRect();
  var x = ev.clientX - rect.left;
  var y = ev.clientY - rect.top;
  handlePointerMove(x, y, mouseId);
});

canvas.addEventListener('mouseup', function(ev){
  mouseDown = false;
  handlePointerUp(mouseId);
});

// Pointer handlers
function handlePointerDown(x, y, id){
  if(gameState === 'menu'){
    for(var i = 0; i < menuBtns.length; i++){
      var b = menuBtns[i];
      if(isInRect(x, y, b.x - b.w/2, b.y - b.h/2, b.w, b.h)){
        if(b.action === 'play') startLevel(0);
        else if(b.action === 'levels') gameState = 'levelSelect';
        else if(b.action === 'endless') startEndless();
        return;
      }
    }
    return;
  }
  if(gameState === 'levelSelect'){
    for(var i = 0; i < levelBtns.length; i++){
      var b = levelBtns[i];
      if(b.unlocked && isInRect(x, y, b.x, b.y, b.w, b.h)){
        startLevel(b.level);
        return;
      }
    }
    // Back button
    if(isInRect(x, y, W/2 - 60, H - 70, 120, 40)){
      gameState = 'menu';
      return;
    }
    return;
  }
  if(gameState === 'paused'){
    gameState = 'playing';
    return;
  }
  if(gameState === 'gameOver'){
    if(isInRect(x, y, W/2 - 70, H/2 + 70, 140, 40)){
      if(currentLevel >= 0) startLevel(currentLevel);
      else startEndless();
    }
    return;
  }
  if(gameState === 'levelComplete'){
    if(currentLevel + 1 < 7 && isInRect(x, y, W/2 - 70, H/2 + 50, 140, 40)){
      startLevel(currentLevel + 1);
      return;
    }
    if(isInRect(x, y, W/2 - 50, H/2 + 100, 100, 35)){
      gameState = 'menu';
      return;
    }
    return;
  }
  if(gameState === 'playing'){
    // Check skill buttons
    for(var i = 0; i < skillBtns.length; i++){
      var sb = skillBtns[i];
      var dx = x - sb.x;
      var dy = y - sb.y;
      if(dx * dx + dy * dy <= sb.r * sb.r){
        useSkill(i);
        return;
      }
    }
    // Check pause button
    if(isInRect(x, y, W - 55, 45, 40, 25)){
      gameState = 'paused';
      return;
    }
    // Joystick (left half of screen)
    if(x < W * 0.6){
      joyStart(x, y, id);
    }
  }
}

function handlePointerMove(x, y, id){
  if(gameState === 'playing' && JOY.active && JOY.touchId === id){
    joyMove(x, y);
  }
}

function handlePointerUp(id){
  joyEnd(id);
}

// ===== MAIN LOOP =====
function gameLoop(time){
  if(!lastTime) lastTime = time;
  var delta = time - lastTime;
  lastTime = time;
  if(delta > 100) delta = 16;
  dt = delta / 1000;
  resize();
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ===== INIT =====
resize();
initEnvironment();
window.addEventListener('resize', function(){
  resize();
  initEnvironment();
  if(gameState === 'playing') layoutSkillBtns();
});

requestAnimationFrame(gameLoop);

})();
</script>
