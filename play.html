initAudio();var o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);var t=AC.currentTime;
if(type=="bite"){o.type="sawtooth";o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(40,t+0.15);g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.15)}
else if(type=="eat"){o.type="sine";o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(1200,t+0.1);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.1)}

else if(type=="die"){o.type="sawtooth";o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(50,t+0.5);g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.5)}

o.start(t);o.stop(t+0.5)}

{name:"小虾",size:8,color:["#ff7043","#ffab91"],hp:20,xp:5,speed:2,draw:function(ctx,x,y,s,dir){ctx.save();ctx.translate(x,y);if(dir<0)ctx.scale(-1,1);ctx.beginPath();ctx.moveTo(s,0);ctx.quadraticCurveTo(s*0.3,-s*0.3,0,0);ctx.quadraticCurveTo(-s*0.4,s*0.3,-s,0);ctx.quadraticCurveTo(-s*0.4,s*0.5,0,s*0.4);ctx.quadraticCurveTo(s*0.3,s*0.1,s,0);ctx.fillStyle=this.color[0];ctx.fill();ctx.beginPath();ctx.arc(s*0.5,-s*0.1,s*0.15,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.beginPath();ctx.arc(s*0.55,-s*0.1,s*0.07,0,Math.PI*2);ctx.fillStyle="#000";ctx.fill();ctx.restore()}},

{name:"河豚",size:25,color:["#ab47bc","#ce93d8"],hp:90,xp:25,speed:1.3,draw:function(ctx,x,y,s,dir){ctx.save();ctx.translate(x,y);if(dir<0)ctx.scale(-1,1);ctx.beginPath();ctx.arc(0,0,s*0.8,0,Math.PI*2);ctx.fillStyle=this.color[0];ctx.fill();ctx.strokeStyle="#7b1fa2";ctx.lineWidth=1.5;for(var i=0;i<12;i++){var a=i*Math.PI/6;ctx.beginPath();ctx.moveTo(Math.cos(a)*s*0.75,Math.sin(a)*s*0.75);ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);ctx.stroke()}var w=Math.sin(Date.now()*0.01)*0.25;ctx.beginPath();ctx.moveTo(-s*0.6,0);ctx.quadraticCurveTo(-s*0.9,-s*0.3+w*s,-s*1.1,-s*0.4+w*s);ctx.quadraticCurveTo(-s*0.8,0,-s*1.1,s*0.4+w*s);ctx.quadraticCurveTo(-s*0.9,s*0.3+w*s,-s*0.6,0);ctx.fillStyle=this.color[1];ctx.fill();ctx.beginPath();ctx.arc(s*0.3,-s*0.15,s*0.18,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.beginPath();ctx.arc(s*0.35,-s*0.15,s*0.09,0,Math.PI*2);ctx.fillStyle="#000";ctx.fill();ctx.restore()}},
{name:"海龟",size:35,color:["#558b2f","#8bc34a"],hp:140,xp:40,speed:0.9,draw:function(ctx,x,y,s,dir){ctx.save();ctx.translate(x,y);if(dir<0)ctx.scale(-1,1);ctx.beginPath();ctx.ellipse(0,0,s*0.85,s*0.65,0,0,Math.PI*2);ctx.fillStyle=this.color[0];ctx.fill();ctx.strokeStyle="#33691e";ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,s*0.4,s*0.3,0,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*0.4,0);ctx.lineTo(s*0.4,0);ctx.moveTo(0,-s*0.55);ctx.lineTo(0,s*0.55);ctx.stroke();ctx.beginPath();ctx.ellipse(s*0.8,0,s*0.25,s*0.2,0,0,Math.PI*2);ctx.fillStyle=this.color[1];ctx.fill();var f=Math.sin(Date.now()*0.006)*0.3;ctx.fillStyle=this.color[1];ctx.save();ctx.translate(s*0.4,-s*0.5);ctx.rotate(-0.4+f);ctx.beginPath();ctx.ellipse(0,-s*0.15,s*0.1,s*0.25,0,0,Math.PI*2);ctx.fill();ctx.restore();ctx.save();ctx.translate(s*0.4,s*0.5);ctx.rotate(0.4-f);ctx.beginPath();ctx.ellipse(0,s*0.15,s*0.1,s*0.25,0,0,Math.PI*2);ctx.fill();ctx.restore();ctx.beginPath();ctx.arc(s*0.85,-s*0.1,s*0.1,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.beginPath();ctx.arc(s*0.88,-s*0.1,s*0.05,0,Math.PI*2);ctx.fillStyle="#000";ctx.fill();ctx.restore()}},
{name:"剑鱼",size:45,color:["#00838f","#4dd0e1"],hp:180,xp:55,speed:2.3,draw:function(ctx,x,y,s,dir){ctx.save();ctx.translate(x,y);if(dir<0)ctx.scale(-1,1);ctx.beginPath();ctx.moveTo(s*1.6,0);ctx.lineTo(s*0.6,-s*0.25);ctx.quadraticCurveTo(0,-s*0.45,-s*0.4,-s*0.2);ctx.quadraticCurveTo(-s*0.8,0,-s*0.4,s*0.2);ctx.quadraticCurveTo(0,s*0.45,s*0.6,s*0.25);ctx.closePath();ctx.fillStyle=this.color[0];ctx.fill();ctx.beginPath();ctx.moveTo(s*1.6,0);ctx.lineTo(s*0.5,-s*0.03);ctx.lineTo(s*0.5,s*0.03);ctx.closePath();ctx.fillStyle="#006064";ctx.fill();ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.lineTo(-s*0.1,-s*0.8);ctx.lineTo(-s*0.35,-s*0.4);ctx.closePath();ctx.fillStyle=this.color[1];ctx.fill();var w=Math.sin(Date.now()*0.012)*0.35;ctx.beginPath();ctx.moveTo(-s*0.4,0);ctx.lineTo(-s*0.9,-s*0.45+w*s);ctx.lineTo(-s*0.65,0);ctx.lineTo(-s*0.9,s*0.45+w*s);ctx.closePath();ctx.fillStyle=this.color[1];ctx.fill();ctx.beginPath();ctx.arc(s*0.5,-s*0.1,s*0.12,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.beginPath();ctx.arc(s*0.53,-s*0.1,s*0.06,0,Math.PI*2);ctx.fillStyle="#000";ctx.fill();ctx.restore()}},
{name:"鲨鱼",size:60,color:["#546e7a","#cfd8dc"],hp:280,xp:90,speed:1.7,draw:function(ctx,x,y,s,dir){ctx.save();ctx.translate(x,y);if(dir<0)ctx.scale(-1,1);ctx.beginPath();ctx.ellipse(0,0,s,s*0.42,0,0,Math.PI*2);ctx.fillStyle=this.color[0];ctx.fill();ctx.beginPath();ctx.ellipse(0,s*0.08,s*0.75,s*0.25,0,0,Math.PI);ctx.fillStyle=this.color[1];ctx.fill();ctx.beginPath();ctx.moveTo(-s*0.05,-s*0.38);ctx.lineTo(s*0.15,-s*0.85);ctx.lineTo(s*0.4,-s*0.38);ctx.closePath();ctx.fillStyle="#37474f";ctx.fill();var w=Math.sin(Date.now()*0.008)*0.3;ctx.beginPath();ctx.moveTo(-s*0.75,0);ctx.lineTo(-s*1.3,-s*0.5+w*s);ctx.lineTo(-s*0.95,0);ctx.lineTo(-s*1.3,s*0.3+w*s);ctx.closePath();ctx.fillStyle="#37474f";ctx.fill();ctx.strokeStyle="#263238";ctx.lineWidth=1.5;for(var i=0;i<3;i++){ctx.beginPath();ctx.moveTo(s*0.25+i*s*0.1,-s*0.08);ctx.lineTo(s*0.25+i*s*0.1,s*0.12);ctx.stroke()}ctx.beginPath();ctx.arc(s*0.55,-s*0.1,s*0.15,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.beginPath();ctx.arc(s*0.6,-s*0.1,s*0.07,0,Math.PI*2);ctx.fillStyle="#000";ctx.fill();ctx.restore()}},
{name:"鲸鱼",size:80,color:["#37474f","#b0bec5"],hp:450,xp:150,speed:0.8,draw:function(ctx,x,y,s,dir){ctx.save();ctx.translate(x,y);if(dir<0)ctx.scale(-1,1);ctx.beginPath();ctx.ellipse(0,0,s,s*0.5,0,0,Math.PI*2);ctx.fillStyle=this.color[0];ctx.fill();ctx.beginPath();ctx.ellipse(s*0.1,s*0.12,s*0.7,s*0.3,0,0,Math.PI);ctx.fillStyle=this.color[1];ctx.fill();ctx.beginPath();ctx.moveTo(-s*0.25,-s*0.45);ctx.lineTo(-s*0.15,-s*0.6);ctx.lineTo(-s*0.05,-s*0.45);ctx.closePath();ctx.fillStyle="#263238";ctx.fill();var w=Math.sin(Date.now()*0.004)*0.25;ctx.beginPath();ctx.moveTo(-s*0.8,0);ctx.quadraticCurveTo(-s*1.2,-s*0.35+w*s,-s*1.45,-s*0.55+w*s);ctx.quadraticCurveTo(-s*1.1,0,-s*1.45,s*0.55+w*s);ctx.quadraticCurveTo(-s*1.2,s*0.35+w*s,-s*0.8,0);ctx.fillStyle="#263238";ctx.fill();ctx.beginPath();ctx.arc(s*0.5,-s*0.08,s*0.18,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.beginPath();ctx.arc(s*0.55,-s*0.08,s*0.09,0,Math.PI*2);ctx.fillStyle="#000";ctx.fill();ctx.save();ctx.globalAlpha=0.4;for(var i=0;i<3;i++){ctx.beginPath();ctx.arc(s*0.15,-s*0.55-i*8,3+i,0,Math.PI*2);ctx.fillStyle="#b3e5fc";ctx.fill()}ctx.restore();ctx.restore()}},
{name:"海怪",size:110,color:["#311b92","#673ab7"],hp:900,xp:400,speed:0.4,draw:function(ctx,x,y,s,dir){ctx.save();ctx.translate(x,y);if(dir<0)ctx.scale(-1,1);ctx.beginPath();ctx.ellipse(0,-s*0.15,s*0.7,s*0.55,0,0,Math.PI*2);ctx.fillStyle=this.color[0];ctx.fill();for(var i=0;i<8;i++){var a=i*Math.PI/4;var tw=Math.sin(Date.now()*0.003+i)*s*0.15;ctx.beginPath();ctx.moveTo(Math.cos(a)*s*0.5,-s*0.15+Math.sin(a)*s*0.3);ctx.quadraticCurveTo(Math.cos(a)*s*0.8+tw,-s*0.1+Math.sin(a)*s*0.5,Math.cos(a)*s*1.1+tw*1.5,s*0.25+Math.sin(a)*s*0.4);ctx.strokeStyle=this.color[1];ctx.lineWidth=5;ctx.lineCap="round";ctx.stroke()}ctx.beginPath();ctx.arc(s*0.15,-s*0.25,s*0.22,0,Math.PI*2);ctx.fillStyle="#d50000";ctx.fill();ctx.beginPath();ctx.arc(s*0.15,-s*0.25,s*0.14,0,Math.PI*2);ctx.fillStyle="#1a1a2e";ctx.fill();ctx.beginPath();ctx.arc(s*0.2,-s*0.3,s*0.06,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.restore()}}

function initLevel(lvl){
currentLevel=lvl;player.x=W/2;player.y=H/2;player.size=20;player.maxSize=20;player.hp=100;player.maxHp=100;player.vx=0;player.vy=0;player.alive=true;player.level=0;player.exp=0;player.expNext=100;
score=0;combo=0;comboTimer=0;maxCombo=0;gameTime=0;shake=0;
fishes=[];chunks=[];particles=[];floats=[];
for(var i=0;i<40;i++)bubbles.push({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*4,s:0.3+Math.random()});
BITE.x=W-60;BITE.y=H-100;
for(i=0;i<4;i++)SKILLS[i].cd=0;
}

function spawnFish(){
if(Math.random()>0.015)return;
var types=FISH_TYPES;
var minIdx=Math.max(0,currentLevel-1);
var maxIdx=Math.min(currentLevel+2,types.length-1);
if(currentLevel===2)maxIdx=7;
if(currentLevel===6)maxIdx=9;
var idx=Math.floor(Math.random()*(maxIdx-minIdx+1))+minIdx;
var type=types[idx];
var side=Math.floor(Math.random()*4);
var x,y,vx,vy;
if(side===0){x=Math.random()*W;y=-type.size-30;vx=(Math.random()-0.5)*2;vy=type.speed*(0.8+Math.random()*0.4);}
else if(side===1){x=W+type.size+30;y=Math.random()*H;vx=-type.speed*(0.8+Math.random()*0.4);vy=(Math.random()-0.5)*2;}
else if(side===2){x=Math.random()*W;y=H+type.size+30;vx=(Math.random()-0.5)*2;vy=-type.speed*(0.8+Math.random()*0.4);}
else{x=-type.size-30;y=Math.random()*H;vx=type.speed*(0.8+Math.random()*0.4);vy=(Math.random()-0.5)*2;}
fishes.push({x:x,y:y,vx:vx,vy:vy,type:type,hp:type.hp,maxHp:type.hp})}

function mkParticles(x,y,color,count,speed){
for(var i=0;i<count;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*(speed||4);particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*20,size:2+Math.random()*4,color:color})}}

function addFloat(x,y,text,color,size){
floats.push({x:x,y:y,text:text,color:color,size:size||16,life:50,vy:-1.5})}

function checkWin(){
var l=currentLevel;
if(l===0&&score>=10)return true;
if(l===1&&gameTime>=60)return true;
if(l===2&&score>=100)return true;
if(l===3&&player.size>=50)return true;
if(l===4&&score>=150)return true;
if(l===5&&gameTime>=90)return true;
if(l===6&&score>=500)return true;
return false}

canvas.addEventListener("touchstart",function(e){
e.preventDefault();initAudio();
for(var i=0;i<e.changedTouches.length;i++){
var t=e.changedTouches[i],tx=t.clientX,ty=t.clientY;
if(state===ST_MENU){if(tx>W/2-120&&tx<W/2+120&&ty>H*0.65-40&&ty<H*0.65+40){snd("click");state=ST_LEVELS}return}
if(state===ST_LEVELS){if(ty>H-100){state=ST_MENU;return}var idx=Math.floor((ty-80)/70)*3+Math.floor((tx-20)/((W-40)/3));if(idx>=0&&idx<7){snd("click");initLevel(idx);state=ST_PLAY}return}
if(state===ST_DEAD){state=ST_MENU;return}
if(state!==ST_PLAY)continue;
if(tx<W/2&&!JOY.active){JOY.active=true;JOY.id=t.identifier;JOY.x=tx;JOY.y=ty;JOY.kx=tx;JOY.ky=ty;continue}
var bdx=tx-BITE.x,bdy=ty-BITE.y;
if(Math.sqrt(bdx*bdx+bdy*bdy)<BITE.r+20){BITE.pressing=true;if(BITE.cd<=0){BITE.cd=0.3;snd("bite");mkParticles(player.x+Math.cos(player.angle)*player.size,player.y+Math.sin(player.angle)*player.size,"#ff7043",10,4);
for(var fi=fishes.length-1;fi>=0;fi--){var f=fishes[fi];var fdx=player.x+Math.cos(player.angle)*player.size*1.3-f.x,fdy=player.y+Math.sin(player.angle)*player.size*1.3-f.y;if(Math.sqrt(fdx*fdx+fdy*fdy)<player.size+f.type.size*0.6){f.hp-=35;if(f.hp<=0){mkParticles(f.x,f.y,f.type.color[0],20,5);
for(var ci=0;ci<5;ci++){var ca=Math.random()*Math.PI*2,cs=1+Math.random()*2;chunks.push({x:f.x,y:f.y,vx:Math.cos(ca)*cs,vy:Math.sin(ca)*cs,size:3+Math.random()*6,color:f.type.color[0],life:300,value:Math.floor(f.type.xp/3),angle:Math.random()*Math.PI*2})}
fishes.splice(fi,1);score++;player.exp+=f.type.xp;combo++;comboTimer=2;if(combo>maxCombo)maxCombo=combo;if(combo%5===0){snd("combo");addFloat(player.x,player.y-60,"COMBO x"+combo,"#ff1744",24)}if(player.exp>=player.expNext){player.exp-=player.expNext;player.level++;player.expNext=Math.floor(100*Math.pow(1.4,player.level));player.maxSize*=1.15;player.maxHp+=20;player.hp=player.maxHp;snd("levelup");addFloat(player.x,player.y-80,"LEVEL UP!","#ffd700",28);}}else{snd("hit")}break}}continue}
for(var si=0;si<4;si++){var sx=W-45,sy=H-220+si*50;if(tx>sx-25&&tx<sx+25&&ty>sy-25&&ty<sy+25&&SKILLS[si].cd<=0){SKILLS[si].cd=SKILLS[si].max;snd("click");addFloat(player.x,player.y-50,skillIcons[si]+" ACTIVATED","#00e5ff",18);break}}}}
},{passive:false});

canvas.addEventListener("touchmove",function(e){
e.preventDefault();
for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];if(JOY.active&&t.identifier===JOY.id){var dx=t.clientX-JOY.x,dy=t.clientY-JOY.y,d=Math.sqrt(dx*dx+dy*dy);if(d>JOY.r){dx=dx/d*JOY.r;dy=dy/d*JOY.r}JOY.kx=JOY.x+dx;JOY.ky=JOY.y+dy;JOY.dx=dx/JOY.r;JOY.dy=dy/JOY.r}}
},{passive:false});

canvas.addEventListener("touchend",function(e){
e.preventDefault();
for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];if(JOY.active&&t.identifier===JOY.id){JOY.active=false;JOY.dx=0;JOY.dy=0}BITE.pressing=false}
},{passive:false});

function update(){
if(state===ST_PLAY){
if(JOY.active){player.vx+=JOY.dx*0.6;player.vy+=JOY.dy*0.6;if(Math.abs(JOY.dx)>0.1||Math.abs(JOY.dy)>0.1)player.angle=Math.atan2(JOY.dy,JOY.dx)}
player.vx*=0.9;player.vy*=0.9;player.x+=player.vx;player.y+=player.vy;
player.x=Math.max(player.size,Math.min(W-player.size,player.x));
player.y=Math.max(player.size,Math.min(H-player.size,player.y));
player.size=player.maxSize*0.8+Math.sin(Date.now()*0.005)*player.maxSize*0.05;
spawnFish();
for(var i=fishes.length-1;i>=0;i--){var f=fishes[i];f.x+=f.vx;f.y+=f.vy;var dx=player.x-f.x,dy=player.y-f.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<player.size+f.type.size&&player.alive){if(player.size>=f.type.size*0.9){f.hp-=100}else{state=ST_DEAD;snd("die")}}
if(f.x<-100||f.x>W+100||f.y<-100||f.y>H+100)fishes.splice(i,1)}
for(var i=chunks.length-1;i>=0;i--){var c=chunks[i];c.x+=c.vx;c.y+=c.vy;c.vx*=0.95;c.vy*=0.95;c.life--;var cdx=player.x-c.x,cdy=player.y-c.y;if(Math.sqrt(cdx*cdx+cdy*cdy)<player.size+c.size){player.maxSize+=0.1;score+=c.value;snd("eat");addFloat(c.x,c.y-20,"+"+c.value,"#69f0ae",14);chunks.splice(i,1);continue}if(c.life<=0)chunks.splice(i,1)}
for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;if(p.life<=0)particles.splice(i,1)}
for(var i=floats.length-1;i>=0;i--){var f=floats[i];f.y+=f.vy;f.life--;if(f.life<=0)floats.splice(i,1)}
if(combo>0){comboTimer-=0.016;if(comboTimer<=0)combo=0}
for(var i=0;i<4;i++)if(SKILLS[i].cd>0)SKILLS[i].cd-=0.016;
if(BITE.cd>0)BITE.cd-=0.016;
if(shake>0)shake*=0.9;
gameTime+=0.016;
if(checkWin()){state=ST_LEVELS;snd("levelup")}}}

function draw(){
ctx.fillStyle="#020a18";ctx.fillRect(0,0,W,H);
var g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#010812");g.addColorStop(0.5,"#081e3d");g.addColorStop(1,"#0d2847");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
ctx.save();ctx.globalAlpha=0.05;
for(var i=0;i<5;i++){var lx=(i*W/4+Date.now()*0.02)%W;ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx+50,H);ctx.lineTo(lx-20,H);ctx.closePath();ctx.fillStyle="#4fc3f7";ctx.fill()}ctx.restore();
ctx.save();for(var i=0;i<bubbles.length;i++){var b=bubbles[i];b.y-=b.s;b.x+=Math.sin(Date.now()*0.001+i)*0.5;if(b.y<-10)b.y=H+10;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle="rgba(128,222,234,0.3)";ctx.fill()}ctx.restore();
for(var i=0;i<chunks.length;i++){var c=chunks[i];ctx.save();ctx.beginPath();ctx.arc(c.x,c.y,c.size,0,Math.PI*2);ctx.fillStyle=c.color;ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=1;ctx.stroke();ctx.restore()}
for(var i=0;i<fishes.length;i++){var f=fishes[i];f.type.draw(ctx,f.x,f.y,f.type.size,f.vx>0?1:-1);if(f.hp<f.maxHp){var bw=f.type.size*1.5,bh=4,bx=f.x-bw/2,by=f.y-f.type.size-10,r=f.hp/f.maxHp;ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(bx,by,bw,bh);ctx.fillStyle=r>0.5?"#4caf50":r>0.25?"#ff9800":"#f44336";ctx.fillRect(bx,by,bw*r,bh)}}
ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.angle);ctx.beginPath();ctx.ellipse(0,0,player.size,player.size*0.6,0,0,Math.PI*2);ctx.fillStyle="#00d4ff";ctx.fill();ctx.beginPath();ctx.moveTo(-player.size*0.8,0);ctx.quadraticCurveTo(-player.size*1.2,-player.size*0.4,-player.size*1.5,0);ctx.quadraticCurveTo(-player.size*1.2,player.size*0.4,-player.size*0.8,0);ctx.fillStyle="#0091ea";ctx.fill();ctx.beginPath();ctx.arc(player.size*0.5,-player.size*0.12,player.size*0.18,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.beginPath();ctx.arc(player.size*0.55,-player.size*0.12,player.size*0.09,0,Math.PI*2);ctx.fillStyle="#000";ctx.fill();ctx.restore();
var bw=player.size*2,bh=6,bx=player.x-bw/2,by=player.y-player.size-12,r=player.hp/player.maxHp;ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(bx-2,by-2,bw+4,bh+4);ctx.fillStyle=r>0.5?"#00e676":r>0.25?"#ff9800":"#f44336";ctx.fillRect(bx,by,bw*r,bh);ctx.strokeStyle="#fff";ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
for(var i=0;i<particles.length;i++){var p=particles[i];ctx.save();ctx.globalAlpha=p.life/50;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore()}
for(var i=0;i<floats.length;i++){var f=floats[i];ctx.save();ctx.globalAlpha=f.life/50;ctx.fillStyle=f.color;ctx.font="bold "+f.size+"px Arial";ctx.textAlign="center";ctx.fillText(f.text,f.x,f.y);ctx.restore()}
if(state===ST_PLAY){ctx.fillStyle="rgba(2,8,18,0.5)";ctx.fillRect(0,0,W,40);ctx.fillStyle="#fff";ctx.font="bold 18px Arial";ctx.fillText("🐟 "+score+" | Lv."+(player.level+1),10,25);ctx.fillStyle="#78909c";ctx.font="12px Arial";ctx.fillText(levelNames[currentLevel]+" | "+Math.floor(gameTime)+"s",10,55);if(combo>0){ctx.fillStyle="#ff1744";ctx.font="bold "+(20+Math.min(combo*2,20))+"px Arial";ctx.textAlign="right";ctx.fillText("COMBO x"+combo,W-10,30)}
if(JOY.active){ctx.save();ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(JOY.x,JOY.y,JOY.r,0,Math.PI*2);ctx.fillStyle="#263238";ctx.fill();ctx.strokeStyle="#546e7a";ctx.lineWidth=2;ctx.stroke();ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(JOY.kx,JOY.ky,JOY.kr,0,Math.PI*2);ctx.fillStyle="#00e5ff";ctx.fill();ctx.restore()}
ctx.save();ctx.translate(BITE.x,BITE.y);var sc=BITE.pressing?0.9:1;ctx.scale(sc,sc);ctx.beginPath();ctx.arc(0,0,BITE.r,0,Math.PI*2);ctx.fillStyle=BITE.cd>0?"rgba(120,144,156,0.4)":"rgba(244,67,54,0.4)";ctx.fill();ctx.fillStyle="#fff";ctx.font="bold 24px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("🦷",0,0);if(BITE.cd>0){ctx.fillStyle="rgba(0,0,0,0.6)";ctx.beginPath();ctx.arc(0,0,BITE.r+2,Math.PI*2*(1-BITE.cd/0.3),Math.PI*2);ctx.lineTo(0,0);ctx.fill()}ctx.restore();
for(var i=0;i<4;i++){var sx=W-45,sy=H-220+i*50;ctx.beginPath();ctx.arc(sx,sy,22,0,Math.PI*2);ctx.fillStyle=SKILLS[i].cd>0?"rgba(60,80,90,0.4)":"rgba(0,229,255,0.3)";ctx.fill();ctx.fillStyle="#fff";ctx.font="20px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(skillIcons[i],sx,sy);if(SKILLS[i].cd>0){ctx.fillStyle="rgba(0,0,0,0.5)";ctx.font="12px Arial";ctx.fillText(Math.ceil(SKILLS[i].cd),sx,sy+24)}}
if(shake>0)ctx.setTransform(1,0,0,1,(Math.random()-0.5)*shake,(Math.random()-0.5)*shake)}
if(state===ST_MENU){ctx.fillStyle="#00e5ff";ctx.font="bold 48px Arial";ctx.textAlign="center";ctx.fillText("🐟 小鱼快跑",W/2,H/3);ctx.fillStyle="#78909c";ctx.font="16px Arial";ctx.fillText("悬浮摇杆 · 撕咬攻击 · 鱼块成长",W/2,H/3+40);FISH_TYPES[1].draw(ctx,W/2,H*0.5,40,1);ctx.fillStyle="#0091ea";ctx.beginPath();ctx.roundRect(W/2-120,H*0.65-40,240,80,20);ctx.fill();ctx.fillStyle="#fff";ctx.font="bold 24px Arial";ctx.fillText("开始游戏",W/2,H*0.65+5)}
if(state===ST_LEVELS){ctx.fillStyle="#00e5ff";ctx.font="bold 36px Arial";ctx.textAlign="center";ctx.fillText("选择关卡",W/2,50);for(var i=0;i<7;i++){var lx=20+(i%3)*((W-40)/3),ly=80+Math.floor(i/3)*90;ctx.fillStyle="rgba(0,145,234,0.3)";ctx.beginPath();ctx.roundRect(lx,ly,(W-40)/3-10,80,10);ctx.fill();ctx.fillStyle="#fff";ctx.font="bold 16px Arial";ctx.textAlign="center";ctx.fillText(levelNames[i],lx+(W-40)/6-5,ly+30);ctx.fillStyle="#78909c";ctx.font="12px Arial";ctx.fillText(levelGoals[i],lx+(W-40)/6-5,ly+55)}ctx.fillStyle="#546e7a";ctx.font="14px Arial";ctx.fillText("点击返回",W/2,H-30)}
if(state===ST_DEAD){ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#ff5252";ctx.font="bold 36px Arial";ctx.textAlign="center";ctx.fillText("🦈 被吃掉了!",W/2,H/3);ctx.fillStyle="#fff";ctx.font="24px Arial";ctx.fillText("得分: "+score+" | 连击: "+maxCombo,W/2,H/2);ctx.fillStyle="#78909c";ctx.font="16px Arial";ctx.fillText("点击返回菜单",W/2,H*0.6)}requestAnimationFrame(draw)}
resize();draw();
</script></body></html>
